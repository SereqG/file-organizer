# Public demo stack. The browser only ever talks to the frontend (same-origin Next route handlers);
# the backend is reachable only on the internal network, so no port is published for it and no CORS
# is opened — the frontend proxies every call over the private network.

services:
  backend:
    build: ./apps/backend
    environment:
      # AI Classifier node: the OpenRouter API key is supplied per-user from the browser, never here.
      # Only the model is configurable server-side.
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash}
    volumes:
      # Per-session sandboxes + the SQLite database (sessions / saved workflows / run history).
      - sandbox-data:/app/var
      # Execution logs referenced by run history.
      - run-logs:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/workflows/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    environment:
      # Server-side base URL the Next route handlers proxy to (internal network DNS name).
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  sandbox-data:
  run-logs:
